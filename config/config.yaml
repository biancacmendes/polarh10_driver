bluetooth:
  device_address: "D6531279-6A6E-DDA8-C1D5-13D102E3EA9A"
  scan_timeout: 10

# Operating mode of the driver
# modes:
#   "stream"   -> continuously sends data through the gateway
#   "record"   -> records locally to file
#   "hybrid"   -> streams and allows recording to be triggered remotely
mode: "stream"

ecg:
  sample_rate_hz: 130
  resolution_bits: 14

recording:
  enabled: false
  output_file: "ecg_raw.csv"

  # Optional automatic recording duration
  duration_seconds: 60

  # Allows the WebSocket server or HTTP endpoint to trigger recording
  trigger:
    enabled: true
    start_endpoint: "/record/start"
    stop_endpoint: "/record/stop"

gateway:
  enabled: true
  host: "0.0.0.0"
  port: 8765
  websocket_path: "/stream"

stream:
  packet_size: 20
  send_ecg: true
  send_rr: true
  send_hr: true

# Enable an HTML page for data visualization (prototype!)
visualization:
  enabled: true
  route: "/"

# HRV metrics configuration
metrics:

  rr: true # RR interval between consecutive R-peaks.

  hr: true # Instantaneous heart rate derived from RR.

  rmssd: true  # Short-term HRV metric commonly used in streaming analysis.

  sdnn: true   # Not recommended for strict online interpretation.
               # SDNN is formally defined over longer windows (typically ≥5 minutes).
               # Real-time values should be considered approximate.
               # Recommended to compute offline for clinical accuracy.

  pnn50: true  # Not recommended for online interpretation.
               # Highly dependent on window length and unstable with small RR buffers.
               # Offline processing over longer segments is recommended.

  lf_hf: false # Not recommended for online calculation.
               # Requires spectral estimation over a stable RR series.
               # Computationally heavier and unreliable with short windows.
               # Strongly recommended to compute offline.